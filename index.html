<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>INT 4.8 · AUX Live Final UI</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root{
  --bg:#090b10;
  --surface:#10131b;
  --surface-2:#151926;
  --card:#1a2030;
  --card-2:#20273a;
  --border:#30394f;
  --border-soft:rgba(255,255,255,0.075);
  --text:#f4f7ff;
  --muted:#8993b1;
  --soft:#b6bdd3;
  --in:#20e090;
  --out:#ff647f;
  --total:#6bb8ff;
  --accent:#ffd166;
  --warn:#ffb347;
  --in-bg:rgba(32,224,144,0.13);
  --out-bg:rgba(255,100,127,0.13);
  --total-bg:rgba(107,184,255,0.13);
  --accent-bg:rgba(255,209,102,0.13);
  --shadow:0 16px 44px rgba(0,0,0,0.44);
}

html, body { min-height:100%; }
body{
  background:
    radial-gradient(circle at 10% 0%, rgba(107,184,255,0.12), transparent 32%),
    radial-gradient(circle at 92% 12%, rgba(32,224,144,0.08), transparent 30%),
    var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:10px;
}

.app{
  width:min(430px, calc(100vw - 12px));
  background:linear-gradient(180deg, rgba(21,25,38,0.98), rgba(12,15,22,0.98));
  border:1px solid rgba(255,209,102,0.45);
  border-radius:14px;
  box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.025);
  overflow:hidden;
}

.topbar{
  display:grid;
  grid-template-columns:96px 1fr;
  gap:8px;
  padding:8px;
  background:linear-gradient(135deg, rgba(32,39,58,0.96), rgba(16,19,27,0.96));
  border-bottom:1px solid var(--border-soft);
}

.brand{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:6px;
}
.title-wrap{ display:flex; flex-direction:column; gap:1px; }
.app-title{
  font-family:Impact,'Arial Narrow',sans-serif;
  font-size:1.65rem;
  line-height:0.9;
  letter-spacing:0.11em;
  color:var(--accent);
  text-shadow:0 0 12px rgba(255,209,102,0.12);
}
.app-sub{
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.52rem;
  letter-spacing:0.08em;
  color:var(--muted);
  text-transform:uppercase;
  font-weight:900;
}

.status-pill{
  height:21px;
  border-radius:999px;
  padding:0 7px;
  display:inline-flex;
  align-items:center;
  gap:6px;
  align-self:flex-start;
  background:rgba(255,255,255,0.045);
  border:1px solid var(--border);
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.55rem;
  font-weight:900;
  text-transform:uppercase;
}
.status-pill .dot{ width:7px; height:7px; border-radius:50%; background:var(--muted); }
.status-pill.live{ color:var(--in); border-color:rgba(32,224,144,0.38); background:var(--in-bg); }
.status-pill.live .dot{ background:var(--in); box-shadow:0 0 8px rgba(32,224,144,0.9); }

.capture-dock{ min-width:0; display:flex; flex-direction:column; gap:4px; }
.capture-area{
  width:100%;
  height:46px;
  min-height:38px;
  max-height:80px;
  resize:vertical;
  background:#0b0e15;
  border:1px solid rgba(107,184,255,0.24);
  border-radius:8px;
  color:var(--text);
  outline:none;
  padding:6px 7px;
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.61rem;
  line-height:1.28;
  font-weight:800;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.015);
}
.capture-area:focus{ border-color:rgba(107,184,255,0.58); box-shadow:0 0 0 2px rgba(107,184,255,0.1), inset 0 0 0 1px rgba(255,255,255,0.02); }
.capture-area::placeholder{ color:rgba(182,189,211,0.55); }
.capture-foot{ display:flex; align-items:center; gap:6px; }
.auto-note{
  flex:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.55rem;
  font-weight:800;
}
.auto-note .cnt{ color:var(--accent); }
.auto-note .good{ color:var(--in); }
.auto-note .blue{ color:var(--total); }
.top-btn{
  height:22px;
  padding:0 8px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--soft);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.54rem;
  font-weight:900;
  cursor:pointer;
  transition:all 0.12s;
}
.top-btn:hover{ border-color:var(--out); color:var(--out); background:var(--out-bg); }

.focus-panel{
  padding:7px 8px 8px;
  border-bottom:1px solid var(--border-soft);
  background:rgba(0,0,0,0.13);
}
.focus-head{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:6px;
  align-items:center;
  margin-bottom:6px;
}
.focus-title{
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  color:var(--soft);
  font-size:0.56rem;
  font-weight:900;
  letter-spacing:0.08em;
  text-transform:uppercase;
  white-space:nowrap;
}
.priority-rows{ display:flex; flex-direction:column; gap:5px; }
.priority-row{
  display:grid;
  grid-template-columns:48px 52px 40px 48px 42px 63px 31px 34px;
  gap:4px;
  align-items:center;
  min-width:0;
  padding:5px;
  border:1px solid var(--border-soft);
  background:rgba(255,255,255,0.035);
  border-radius:9px;
}
.priority-row.active{ border-color:rgba(107,184,255,0.45); background:linear-gradient(90deg, rgba(107,184,255,0.11), rgba(255,255,255,0.035)); }
.pr-lob{
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:7px;
  border:1px solid var(--border);
  background:var(--card-2);
  color:var(--text);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.57rem;
  font-weight:900;
  white-space:nowrap;
}
.req-target{
  height:28px;
  width:100%;
  background:#0b0e15;
  border:1px solid var(--border);
  border-radius:7px;
  color:var(--accent);
  outline:none;
  text-align:center;
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.78rem;
  font-weight:900;
  -moz-appearance:textfield;
}
.req-target::-webkit-outer-spin-button,
.req-target::-webkit-inner-spin-button{ -webkit-appearance:none; }
.req-target:focus{ border-color:rgba(255,209,102,0.66); box-shadow:0 0 0 2px rgba(255,209,102,0.1); }
.auto-req-btn{
  height:28px;
  border-radius:7px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--soft);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.51rem;
  font-weight:900;
  cursor:pointer;
  transition:all 0.12s;
}
.auto-req-btn:hover,
.auto-req-btn.active{ border-color:rgba(107,184,255,0.58); color:var(--total); background:var(--total-bg); }
.pr-mini{
  min-width:0;
  height:28px;
  border-radius:7px;
  border:1px solid transparent;
  background:rgba(0,0,0,0.14);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  line-height:1;
}
.pr-mini small{
  display:block;
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.42rem;
  font-weight:900;
  letter-spacing:0.06em;
  text-transform:uppercase;
  margin-bottom:2px;
}
.pr-mini strong{
  display:block;
  font-family:Impact,'Arial Narrow',sans-serif;
  font-weight:400;
  font-size:1.06rem;
  letter-spacing:0.03em;
  color:var(--soft);
  line-height:0.9;
}
.pr-mini.pct.good{ border-color:rgba(32,224,144,0.36); background:var(--in-bg); }
.pr-mini.pct.good strong{ color:var(--in); }
.pr-mini.pct.bad{ border-color:rgba(255,100,127,0.36); background:var(--out-bg); }
.pr-mini.pct.bad strong{ color:var(--out); }
.pr-mini.heads strong{ color:var(--accent); }
.pr-mini.heads.zero strong{ color:var(--muted); }
.pr-mini.avail strong{ color:var(--accent); font-size:0.95rem; }
.pr-mini.in strong{ color:var(--in); }
.pr-mini.out strong{ color:var(--out); }

.lob-list{ padding:8px 8px 10px; display:flex; flex-direction:column; gap:8px; }
.lob-card{
  background:linear-gradient(180deg, rgba(26,32,48,0.98), rgba(16,19,27,0.98));
  border:1px solid var(--border);
  border-radius:12px;
  padding:8px;
  overflow:hidden;
  position:relative;
}
.lob-card.active{ border-color:rgba(107,184,255,0.48); box-shadow:0 0 0 1px rgba(107,184,255,0.05); }
.lob-card::before{
  content:'';
  position:absolute;
  inset:0 0 auto 0;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(107,184,255,0.42), transparent);
  opacity:0.55;
}
.lob-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  margin-bottom:7px;
}
.lob-id{ display:flex; align-items:center; gap:7px; min-width:0; }
.lob-name{
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.74rem;
  font-weight:900;
  color:var(--text);
  background:var(--card-2);
  border:1px solid var(--border);
  border-radius:7px;
  padding:4px 8px;
  letter-spacing:0.02em;
  white-space:nowrap;
}
.lob-meta{
  min-width:0;
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.54rem;
  line-height:1.4;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.lob-actions{ display:flex; align-items:center; gap:5px; flex-shrink:0; }
.clear-btn{
  height:25px;
  width:26px;
  border-radius:7px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.58rem;
  font-weight:900;
  cursor:pointer;
  transition:all 0.12s;
}
.clear-btn:hover{ border-color:rgba(255,100,127,0.6); color:var(--out); background:var(--out-bg); }

.auto-panel{
  display:none;
  margin-bottom:7px;
  padding:7px;
  border-radius:9px;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.18);
}
.auto-panel.open{ display:block; }
.auto-panel-hint{
  margin-bottom:5px;
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.55rem;
  line-height:1.42;
  font-weight:800;
}
.auto-panel-hint b{ color:var(--text); }
.auto-textarea{
  width:100%;
  height:62px;
  resize:vertical;
  min-height:44px;
  max-height:150px;
  border-radius:7px;
  border:1px solid var(--border);
  background:#0b0e15;
  color:var(--text);
  padding:6px 7px;
  outline:none;
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.61rem;
  line-height:1.35;
  font-weight:800;
}
.auto-textarea:focus{ border-color:rgba(107,184,255,0.55); }
.auto-status{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  margin-top:5px;
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.54rem;
  line-height:1.35;
  font-weight:900;
}
.auto-status .next-time{ color:var(--total); }
.auto-status .err{ color:var(--out); }
.auto-clear-btn{
  height:22px;
  padding:0 7px;
  border-radius:5px;
  border:1px solid var(--border);
  background:#0b0e15;
  color:var(--soft);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.52rem;
  font-weight:900;
  cursor:pointer;
}
.auto-clear-btn:hover{ border-color:rgba(255,100,127,0.6); color:var(--out); background:var(--out-bg); }

.metric-grid{
  display:grid;
  grid-template-columns:1.05fr 0.75fr 0.88fr 0.82fr 0.82fr;
  gap:6px;
  margin-bottom:7px;
}
.metric{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border-soft);
  border-radius:9px;
  padding:5px;
  min-width:0;
  text-align:center;
}
.metric-label{
  display:flex;
  justify-content:center;
  gap:4px;
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.48rem;
  font-weight:900;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:3px;
  white-space:nowrap;
}
.metric.pct.good{ border-color:rgba(32,224,144,0.36); background:var(--in-bg); }
.metric.pct.bad{ border-color:rgba(255,100,127,0.36); background:var(--out-bg); }
.metric.pct.good .val-pct{ color:var(--in); }
.metric.pct.bad .val-pct{ color:var(--out); }
.metric.heads .val-heads{ color:var(--accent); }
.metric.heads .val-heads.zero{ color:var(--muted); }
.metric.avail .live-time{ color:var(--accent); font-size:1.18rem; }
.metric.in .metric-label, .metric.in .val-num{ color:var(--in); }
.metric.out .metric-label, .metric.out .val-num{ color:var(--out); }
.val-pct,
.val-heads,
.val-num{
  font-family:Impact,'Arial Narrow',sans-serif;
  font-weight:400;
  font-size:1.38rem;
  line-height:0.95;
  letter-spacing:0.04em;
  color:var(--soft);
}
.val-sub{
  margin-top:3px;
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  color:var(--muted);
  font-size:0.49rem;
  font-weight:900;
}
.val-sub .pos{ color:var(--total); }
.val-sub .neg{ color:var(--out); }
.metric-main{ display:flex; align-items:center; justify-content:center; gap:3px; }
.adj-btn{
  width:19px;
  height:19px;
  border-radius:5px;
  border:1px solid var(--border);
  background:#0b0e15;
  color:var(--soft);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.78rem;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  transition:all 0.1s;
}
.metric.in .adj-btn:hover{ border-color:rgba(32,224,144,0.58); color:var(--in); background:var(--in-bg); }
.metric.out .adj-btn:hover{ border-color:rgba(255,100,127,0.58); color:var(--out); background:var(--out-bg); }
.adj-btn:active{ transform:scale(0.92); }
.num-stack{ min-width:26px; display:flex; flex-direction:column; align-items:center; line-height:1; }
.live-name-mini{
  margin-top:3px;
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.47rem;
  font-weight:800;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.live-grid{
  display:grid;
  grid-template-columns:1fr 1fr 0.95fr;
  gap:6px;
  margin-bottom:7px;
}
.live-card{
  min-width:0;
  border:1px solid var(--border-soft);
  border-radius:9px;
  background:rgba(0,0,0,0.15);
  padding:6px 6px 5px;
}
.live-label{
  display:flex;
  justify-content:space-between;
  gap:5px;
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.48rem;
  font-weight:900;
  letter-spacing:0.07em;
  text-transform:uppercase;
  white-space:nowrap;
}
.live-label .tag-in{ color:var(--in); }
.live-label .tag-out{ color:var(--out); }
.live-label .tag-avail{ color:var(--accent); }
.live-time{
  display:block;
  margin-top:2px;
  font-family:Impact,'Arial Narrow',sans-serif;
  font-size:1.28rem;
  line-height:1;
  letter-spacing:0.04em;
  color:var(--soft);
  white-space:nowrap;
}
.live-card.in .live-time{ color:var(--in); }
.live-card.out .live-time{ color:var(--out); }
.live-card.avail .live-time{ color:var(--accent); }
.live-name{
  margin-top:3px;
  color:var(--muted);
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.49rem;
  font-weight:800;
  line-height:1.25;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.strip{
  display:flex;
  gap:5px;
  overflow-x:auto;
  padding-bottom:1px;
  scrollbar-width:thin;
}
.strip::-webkit-scrollbar{ height:5px; }
.strip::-webkit-scrollbar-thumb{ background:var(--border); border-radius:999px; }
.person-chip{
  flex:0 0 auto;
  max-width:150px;
  border-radius:999px;
  border:1px solid var(--border-soft);
  background:rgba(255,255,255,0.035);
  color:var(--soft);
  padding:4px 7px;
  font-family:Consolas,'Roboto Mono','Courier New',monospace;
  font-size:0.5rem;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.person-chip.in{ border-color:rgba(32,224,144,0.28); color:var(--in); background:rgba(32,224,144,0.08); }
.person-chip.out{ border-color:rgba(255,100,127,0.28); color:var(--out); background:rgba(255,100,127,0.08); }
.person-chip.empty{ color:var(--muted); }

@media (max-width:405px){
  .app{ width:calc(100vw - 8px); }
  .topbar{ grid-template-columns:88px 1fr; padding:7px; }
  .app-title{ font-size:1.48rem; }
  .priority-row{ grid-template-columns:44px 48px 38px 46px 39px 58px 29px 32px; gap:3px; padding:4px; }
  .pr-mini small{ font-size:0.38rem; }
  .pr-mini strong{ font-size:0.98rem; }
  .metric-grid{ grid-template-columns:1fr 0.72fr 0.88fr; }
  .live-grid{ grid-template-columns:1fr; }
}


/* ---------- INT 4.5 focus-list redesign ---------- */
.app{
  width:min(520px, calc(100vw - 12px));
  height:min(920px, calc(100vh - 12px));
  display:flex;
  flex-direction:column;
}
.topbar{
  grid-template-columns:100px 1fr;
  gap:9px;
  padding:9px;
  flex:0 0 auto;
}
.app-title{ font-size:1.9rem; }
.capture-area{
  height:52px;
  font-size:0.66rem;
  line-height:1.24;
}
.focus-panel{
  flex:0 0 auto;
  padding:9px;
  min-height:258px;
}
.focus-head{ margin-bottom:8px; }
.priority-rows{ gap:8px; }
.priority-row{
  grid-template-columns:43px 60px 43px minmax(76px,1.25fr) minmax(58px,0.82fr) minmax(86px,1.08fr) minmax(45px,0.55fr) minmax(45px,0.55fr);
  min-height:62px;
  padding:7px;
  gap:5px;
  border-radius:12px;
  background:rgba(255,255,255,0.045);
}
.priority-row.active{
  border-color:rgba(107,184,255,0.72);
  background:linear-gradient(90deg, rgba(107,184,255,0.18), rgba(32,224,144,0.055));
  box-shadow:0 0 0 1px rgba(107,184,255,0.08), inset 0 0 18px rgba(107,184,255,0.04);
}
.pr-lob,
.req-target,
.auto-req-btn,
.pr-mini{ height:46px; border-radius:10px; }
.pr-lob{ font-size:0.72rem; }
.req-target{ font-size:1.12rem; }
.auto-req-btn{ font-size:0.6rem; }
.pr-mini small{
  font-size:0.48rem;
  margin-bottom:4px;
  letter-spacing:0.08em;
}
.pr-mini strong{
  font-size:1.62rem;
  line-height:0.9;
}
.pr-mini.pct strong{ font-size:1.9rem; }
.pr-mini.heads strong{ font-size:1.78rem; }
.pr-mini.avail strong{ font-size:1.34rem; letter-spacing:0.01em; }
.pr-mini.in strong,
.pr-mini.out strong{ font-size:1.58rem; }
.lob-list{
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  padding:9px;
  gap:0;
  scrollbar-width:thin;
}

      <div class="title-wrap">

        placeholder="Ctrl+A → Ctrl+C from INT X, then paste here..."

<script>
const IN_KW  = new Set(['auxin','auxout','available','followup/outboundout','hold','busyin','acw','acwout']);
const OUT_KW = new Set(['personal','system problems','break','lunch','coaching','nps','project','followup/outbound','auxwk','meeting']);
const IGNORE_NAME_LINES = new Set(['actions','action menu','load complete','loading complete','save','menu']);
const SNAPSHOT_LIVE_TIMER_MS = 120000;
const CLEAR_DELAY_MS = 10000;

const LOBS = [
  { id: 1, label: 'CSA T2', short: 'T2', aliases: ['csa tier2','csa t2','t2','tier2'] },
  { id: 2, label: 'CSA SP', short: 'SP', aliases: ['csa sp','sp','spanish','spa'] },
  { id: 3, label: 'CSA T1', short: 'T1', aliases: ['csa tier1','csa t1','t1','tier1'] }
];

const state = LOBS.map(l => ({
  id: l.id,
  baseIn: 0,
  baseOut: 0,
  adjIn:  0,
  adjOut: 0,
  lockCleared: false,
  maxAvailSec: null,
  records: [],
  unknownStatuses: [],
  metaLine: '',
  meta: null,
  snapshotAt: null,
  liveTimerStartedAt: null,
  liveTimerElapsedMs: 0,
  liveTimerActive: false,
  autoSchedule: [],
  autoPanelOpen: false,
  latBePanelOpen: false,
  autoLastAppliedKey: null,
  listSide: 'in'
}));

let masterCache = '';
let clearTimerHandle = null;
let clearCountdownHandle = null;
let activeLiveLobId = 1;

let lastParseHealth = { records: 0, missing: LOBS.map(l => l.short), unknown: 0 };

function masterChanged(){
  const raw = document.getElementById('masterInput').value;
  if (raw !== masterCache) {
    state.forEach(s => s.lockCleared = false);
    masterCache = raw;
  }

  if (raw.trim()) {
    const health = reparse(true);
    if (health.records > 0) {
      scheduleAutoClear(health);
      setHeaderStatus('parsed');
    } else {
      cancelAutoClear();
      lastParseHealth = health;
      document.getElementById('autoNote').innerHTML = `<span class="err">no valid records parsed</span> · check snapshot`;
      setHeaderStatus('warn');
    }
  } else {
    cancelAutoClear();
    lastParseHealth = { records: 0, missing: LOBS.map(l => l.short), unknown: 0 };
    setHeaderStatus('idle');
    document.getElementById('autoNote').textContent = 'waiting for snapshot';
  }
}

function cancelAutoClear(){
  if (clearTimerHandle) clearTimeout(clearTimerHandle);
  if (clearCountdownHandle) clearInterval(clearCountdownHandle);
  clearTimerHandle = null;
  clearCountdownHandle = null;
}

function scheduleAutoClear(health){
  cancelAutoClear();

  const note = document.getElementById('autoNote');
  const raw = document.getElementById('masterInput').value;
  if (!raw.trim()) {
    note.textContent = 'waiting for snapshot';
    return;
  }

  lastParseHealth = health || collectParseHealth();
  let remaining = 10;
  note.innerHTML = `<span class="good">parsed</span> · ${formatParseHealth(lastParseHealth)} · clears in <span class="cnt">${remaining}s</span>`;
  clearCountdownHandle = setInterval(() => {
    remaining -= 1;
    if (remaining <= 0) return;
    note.innerHTML = `<span class="good">parsed</span> · ${formatParseHealth(lastParseHealth)} · clears in <span class="cnt">${remaining}s</span>`;
  }, 1000);

  clearTimerHandle = setTimeout(() => {
    cancelAutoClear();
    document.getElementById('masterInput').value = '';
    masterCache = '';
    note.innerHTML = `<span class="blue">snapshot kept</span> · ${formatParseHealth(lastParseHealth)} · live roster timer`;
    setHeaderStatus('live');
  }, CLEAR_DELAY_MS);
}

function setHeaderStatus(mode){
  const wrap = document.getElementById('hdrStatus');
  const txt = document.getElementById('hdrStatusTxt');
  wrap.classList.remove('live','warn');

  if (mode === 'parsed') {
    wrap.classList.add('live');
    txt.textContent = 'parsed';
  } else if (mode === 'live') {
    wrap.classList.add('live');
    txt.textContent = 'live';
  } else if (mode === 'warn') {
    wrap.classList.add('warn');
    txt.textContent = 'check';
  } else {
    txt.textContent = 'idle';
  }
}


function setListSide(side, id){
  const s = state[id-1];
  if (!s) return;
  s.listSide = side === 'out' ? 'out' : 'in';
  renderRosterList(id);
}

function handleReqTab(event, id){
  if (event.key !== 'Tab') return;
  const orderedIds = LOBS.map(l => l.id);
  const idx = orderedIds.indexOf(id);
  if (idx < 0) return;
  event.preventDefault();
  const nextIdx = event.shiftKey
    ? (idx - 1 + orderedIds.length) % orderedIds.length
    : (idx + 1) % orderedIds.length;
  const next = document.getElementById(`topReq${orderedIds[nextIdx]}`);
  if (next) {
    next.focus();
    next.select();
  }
}

function setActiveLiveLOB(id){
  if (id !== activeLiveLobId) {
    pauseLiveTimerForLOB(activeLiveLobId);
    activeLiveLobId = id;
    resumeLiveTimerForLOB(activeLiveLobId);
  } else {
    resumeLiveTimerForLOB(activeLiveLobId);
  }
  refreshActiveUI();
  LOBS.forEach(l => {
    renderTopRow(l.id);
    renderRosterList(l.id);
  });
  updateHeaderAfterTick();
}

function refreshActiveUI(){
  LOBS.forEach(l => {
    const isActive = l.id === activeLiveLobId;
    document.getElementById(`priorityRow${l.id}`)?.classList.toggle('active', isActive);
    document.getElementById(`lobBlock${l.id}`)?.classList.toggle('active', isActive);
  });
}

function reparse(resetSim){
  const raw = document.getElementById('masterInput').value;
  const cleaned = decodeEntities(raw);
  const lines = cleaned.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const missing = [];

  LOBS.forEach(l => {
    const s = state[l.id-1];
    const data = extractLOBData(lines, l.aliases);
    if (!data || s.lockCleared) {
      if (!data && !s.lockCleared) missing.push(l.short);
      ingestSegment(l.id, [], '', resetSim);
    } else {
      ingestSegment(l.id, data.block, data.metaLine, resetSim);
    }
  });
  refreshTopRows();
  lastParseHealth = collectParseHealth(missing);
  return lastParseHealth;
}

function extractLOBData(lines, aliases){
  const aliasSet = new Set(aliases.map(a => a.toLowerCase()));
  for (let i = 0; i < lines.length; i++){
    if (aliasSet.has(normalizeLobLabel(lines[i]))) {
      let j = i + 1;
      while (j < lines.length && !/^employees\s*:/i.test(lines[j])) j++;
      return {
        block: lines.slice(i + 1, j),
        metaLine: j < lines.length ? lines[j] : ''
      };
    }
  }
  return null;
}

function normalizeLobLabel(line){
  return String(line)
    .toLowerCase()
    .replace(/\s+/g, ' ')
    .trim()
    .replace(/\s*actions\s*$/i, '');
}

function normalizeStatus(line){
  return String(line).toLowerCase().replace(/\s+/g, ' ').trim();
}

function classifyStatus(line, hasTimerAfter){
  const lower = normalizeStatus(line);
  if (IN_KW.has(lower)) return { side: 'in', known: true };
  if (OUT_KW.has(lower)) return { side: 'out', known: true };
  if (!hasTimerAfter) return null;

  // Production rule: unknown AUX/status lines default to OUT, except labels ending in IN or OUT.
  // Both IN and OUT suffixes indicate an active/productive call state in this workflow.
  if (statusEndsWithInOrOut(lower)) return { side: 'in', known: false };
  return { side: 'out', known: false };
}

function statusEndsWithInOrOut(value){
  const s = normalizeStatus(value).replace(/[\])}.,;:]+$/g, '');
  return /(?:^|[\s/_-])(in|out)$/.test(s) || /(in|out)$/.test(s.replace(/[^a-z]/g, ''));
}

function parseDurationToSec(value){
  const m = String(value || '').trim().match(/^(\d{1,3}):(\d{2})(?::(\d{2}))?$/);
  if (!m) return null;
  if (m[3] !== undefined) {
    return (parseInt(m[1], 10) || 0) * 3600 + (parseInt(m[2], 10) || 0) * 60 + (parseInt(m[3], 10) || 0);
  }
  return (parseInt(m[1], 10) || 0) * 60 + (parseInt(m[2], 10) || 0);
}

function parseMetaLine(line){
  const meta = { employees: null, employeesTotal: null, activity: null, activityTotal: null, schedule: null, scheduleTotal: null };
  const text = String(line || '');
  const emp = text.match(/Employees\s*:\s*(\d+)\s*of\s*(\d+)/i);
  const act = text.match(/Activity\s+Alarms\s*:\s*(\d+)\s*of\s*(\d+)/i);
  const sch = text.match(/Schedule\s+Alarms\s*:\s*(\d+)\s*of\s*(\d+)/i);
  if (emp) { meta.employees = parseInt(emp[1], 10); meta.employeesTotal = parseInt(emp[2], 10); }
  if (act) { meta.activity = parseInt(act[1], 10); meta.activityTotal = parseInt(act[2], 10); }
  if (sch) { meta.schedule = parseInt(sch[1], 10); meta.scheduleTotal = parseInt(sch[2], 10); }
  return meta;
}

function ingestSegment(id, segLines, metaLine, resetSim){
  const s = state[id-1];
  s.baseIn = 0;
  s.baseOut = 0;
  s.maxAvailSec = null;
  s.records = [];
  s.unknownStatuses = [];
  s.metaLine = metaLine || '';
  s.meta = parseMetaLine(metaLine);

  let lastName = '';

  segLines.forEach((line, i) => {
    const trimmed = String(line || '').trim();
    const lower = normalizeStatus(trimmed);
    const dur = parseDurationToSec(trimmed);
    const nextDur = parseDurationToSec(segLines[i + 1]);
    const classified = classifyStatus(trimmed, nextDur !== null);

    if (classified) {
      const rec = {
        name: lastName || 'Unknown',
        status: trimmed,
        side: classified.side,
        seconds: nextDur === null ? 0 : nextDur,
        knownStatus: classified.known
      };
      s.records.push(rec);
      if (!classified.known) s.unknownStatuses.push(trimmed);
      if (classified.side === 'in') s.baseIn += 1;
      if (classified.side === 'out') s.baseOut += 1;
      if (lower === 'available') {
        if (s.maxAvailSec === null || rec.seconds > s.maxAvailSec) s.maxAvailSec = rec.seconds;
      }
      return;
    }

    if (dur !== null) return;
    if (IGNORE_NAME_LINES.has(lower)) return;
    if (/^employees\s*:/i.test(trimmed)) return;
    if (/^workspace\s*:/i.test(trimmed)) return;
    if (/real-time adherence/i.test(trimmed)) return;

    lastName = trimmed;
  });

  if (resetSim && (s.baseIn + s.baseOut > 0 || s.records.length > 0)) {
    s.snapshotAt = new Date();
    s.liveTimerElapsedMs = 0;
    s.liveTimerStartedAt = id === activeLiveLobId ? Date.now() : null;
    s.liveTimerActive = true;
  }

  refreshRow(id);
}

function adj(id, side, delta){
  const s = state[id-1];
  if (side === 'in') {
    const newVal = Math.max(0, s.baseIn + s.adjIn + delta);
    s.adjIn = newVal - s.baseIn;
  } else {
    const newVal = Math.max(0, s.baseOut + s.adjOut + delta);
    s.adjOut = newVal - s.baseOut;
  }
  refreshRow(id);
  refreshTopRows();
}

function refreshRow(id){
  renderMeta(id);
  renderTopRow(id);
  renderRosterList(id);
}

function renderDelta(elId, base, adj){
  const el = document.getElementById(elId);
  if (!el) return;
  if (!adj) { el.textContent = `${base}`; return; }
  const sign = adj > 0 ? '+' : '−';
  const cls  = adj > 0 ? 'pos' : 'neg';
  el.innerHTML = `${base} <span class="${cls}">${sign}${Math.abs(adj)}</span>`;
}

function renderMeta(id){
  const s = state[id-1];
  const el = document.getElementById(`lobMeta${id}`);
  const m = s.meta;
  if (!m || m.employees === null) {
    const base = s.records.length ? `${s.records.length} records` : 'no snapshot';
    el.textContent = s.unknownStatuses && s.unknownStatuses.length ? `${base} · UNK ${s.unknownStatuses.length}` : base;
    return;
  }
  const parts = [`Emp ${m.employees}/${m.employeesTotal}`];
  if (m.activity !== null) parts.push(`Act ${m.activity}/${m.activityTotal}`);
  if (m.schedule !== null) parts.push(`Sch ${m.schedule}/${m.scheduleTotal}`);
  if (s.unknownStatuses && s.unknownStatuses.length) parts.push(`UNK ${s.unknownStatuses.length}`);
  el.textContent = parts.join(' · ');
}

function getReqValue(id){
  return parseFloat(document.getElementById(`topReq${id}`).value);
}

function updatePct(id){
  renderTopRow(id);
}


function getTargetRatio(){
  return targetPct / 100;
}

function toggleTargetMode(){
  targetPct = targetPct === 92 ? 100 : 92;
  renderTargetMode();
  refreshTopRows();
}

function renderTargetMode(){
  const btn = document.getElementById('targetToggleBtn');
  if (!btn) return;
  btn.textContent = `REQ ${targetPct}%`;
  btn.classList.toggle('active', targetPct === 100);
}

function getHeadResult(id){
  const s = state[id-1];
  const req = getReqValue(id);
  if (!req || req <= 0) return null;
  const curIn = Math.max(0, s.baseIn + s.adjIn);
  const minIn = Math.ceil(getTargetRatio() * req);
  const diff = curIn - minIn;
  return {
    mode: diff >= 0 ? 'over' : 'need',
    count: Math.abs(diff),
    diff,
    minIn
  };
}

function refreshTopRows(){
  LOBS.forEach(l => renderTopRow(l.id));
}

function renderTopRow(id){
  const s = state[id-1];
  const curIn  = Math.max(0, s.baseIn + s.adjIn);
  const curOut = Math.max(0, s.baseOut + s.adjOut);
  const req = getReqValue(id);
  const total = curIn + curOut;
  const pctTile = document.getElementById(`topPctTile${id}`);
  const headsTile = document.getElementById(`topHeadsTile${id}`);
  const pctEl = document.getElementById(`topPct${id}`);
  const headsEl = document.getElementById(`topHeads${id}`);
  const headsLabelEl = document.getElementById(`topHeadsLabel${id}`);

  document.getElementById(`topIn${id}`).textContent = curIn;
  document.getElementById(`topOut${id}`).textContent = curOut;

  pctTile.classList.remove('good','bad');
  headsTile.classList.remove('zero','good','bad');

  if (!req || req <= 0 || total === 0) {
    pctEl.textContent = '00.00%';
    headsEl.textContent = '—';
    if (headsLabelEl) headsLabelEl.textContent = 'HEAD';
    headsTile.classList.add('zero');
  } else {
    const pct = (curIn / req) * 100;
    const headResult = getHeadResult(id);
    pctEl.textContent = pct.toFixed(2) + '%';
    pctTile.classList.add(pct >= targetPct ? 'good' : 'bad');
    headsEl.textContent = headResult ? headResult.count : '—';
    if (headsLabelEl) headsLabelEl.textContent = headResult && headResult.mode === 'need' ? 'NEED' : 'OVER';
    if (!headResult || headResult.count === 0) headsTile.classList.add('zero');
    else headsTile.classList.add(headResult.mode === 'need' ? 'bad' : 'good');
  }

  const topAvail = getTopRecord(s, 'in', 'available');
  const elapsed = liveElapsedSec(id);
  document.getElementById(`topAvail${id}`).textContent = topAvail ? formatDuration(topAvail.seconds + elapsed) : '—';
  const availNameEl = document.getElementById(`topAvailName${id}`);
  if (availNameEl) availNameEl.textContent = topAvail ? shortName(topAvail.name) : '';
}

function getLiveTimerElapsedMs(s){
  if (!s || !s.liveTimerActive) return 0;
  const running = s.liveTimerStartedAt ? Date.now() - s.liveTimerStartedAt : 0;
  return Math.min(SNAPSHOT_LIVE_TIMER_MS, (s.liveTimerElapsedMs || 0) + running);
}

function pauseLiveTimerForLOB(id){
  const s = state[id-1];
  if (!s || !s.liveTimerActive || !s.liveTimerStartedAt) return;
  s.liveTimerElapsedMs = getLiveTimerElapsedMs(s);
  s.liveTimerStartedAt = null;
  if (s.liveTimerElapsedMs >= SNAPSHOT_LIVE_TIMER_MS) s.liveTimerActive = false;
}

function resumeLiveTimerForLOB(id){
  const s = state[id-1];
  if (!s || !s.snapshotAt || !s.liveTimerActive) return;
  if ((s.liveTimerElapsedMs || 0) >= SNAPSHOT_LIVE_TIMER_MS) {
    s.liveTimerActive = false;
    s.liveTimerStartedAt = null;
    return;
  }
  if (!s.liveTimerStartedAt) s.liveTimerStartedAt = Date.now();
}

function liveElapsedSec(id){
  const s = state[id-1];
  if (id !== activeLiveLobId) return 0;
  if (!s || !s.liveTimerActive) return 0;
  if (!s.liveTimerStartedAt) resumeLiveTimerForLOB(id);
  const elapsed = getLiveTimerElapsedMs(s);
  if (elapsed >= SNAPSHOT_LIVE_TIMER_MS) {
    s.liveTimerElapsedMs = SNAPSHOT_LIVE_TIMER_MS;
    s.liveTimerStartedAt = null;
    s.liveTimerActive = false;
    return 0;
  }
  return Math.floor(elapsed / 1000);
}

function getTopRecord(s, side, statusFilter){
  let records = s.records.filter(r => r.side === side);
  if (statusFilter) records = records.filter(r => normalizeStatus(r.status) === statusFilter);
  if (!records.length) return null;
  return records.reduce((best, r) => r.seconds > best.seconds ? r : best, records[0]);
}

function renderLiveRecord(id, kind, rec, elapsed){
  const statusEl = document.getElementById(`live${kind}Status${id}`);
  const timeEl = document.getElementById(`live${kind}Time${id}`);
  const nameEl = document.getElementById(`live${kind}Name${id}`);

  if (!statusEl || !timeEl || !nameEl) return;

  if (!rec) {
    statusEl.textContent = '—';
    timeEl.textContent = '—';
    nameEl.textContent = kind === 'In' ? 'no IN records' : 'no OUT records';
    return;
  }

  statusEl.textContent = cleanStatusLabel(rec.status);
  timeEl.textContent = formatDuration(rec.seconds + elapsed);
  nameEl.textContent = compactName(rec.name);
}

function renderAvailRecord(id, rec, elapsed){
  const statusEl = document.getElementById(`liveAvailStatus${id}`);
  const timeEl = document.getElementById(`liveAvailTimeDetail${id}`);
  const nameEl = document.getElementById(`liveAvailNameDetail${id}`);
  const miniTimeEl = document.getElementById(`liveAvailTime${id}`);
  const miniNameEl = document.getElementById(`liveAvailName${id}`);

  if (!statusEl || !timeEl || !nameEl || !miniTimeEl || !miniNameEl) return;

  if (!rec) {
    statusEl.textContent = 'max';
    timeEl.textContent = '—';
    nameEl.textContent = 'no available';
    miniTimeEl.textContent = '—';
    miniNameEl.textContent = 'no available';
    return;
  }

  const duration = formatDuration(rec.seconds + elapsed);
  const name = compactName(rec.name);
  statusEl.textContent = 'max';
  timeEl.textContent = duration;
  nameEl.textContent = name;
  miniTimeEl.textContent = duration;
  miniNameEl.textContent = name;
}

function renderStrip(id){
  renderRosterList(id);
}

function renderRosterList(id){
  const s = state[id-1];
  const listEl = document.getElementById(`agentList${id}`);
  if (!listEl) return;

  const elapsed = liveElapsedSec(id);
  const isLive = id === activeLiveLobId && s.liveTimerActive;
  const inRecords = s.records.filter(r => r.side === 'in');
  const outRecords = s.records.filter(r => r.side === 'out');

  document.getElementById(`inListCount${id}`).textContent = inRecords.length;
  document.getElementById(`outListCount${id}`).textContent = outRecords.length;
  document.getElementById(`listBtnIn${id}`).classList.toggle('active', s.listSide === 'in');
  document.getElementById(`listBtnOut${id}`).classList.toggle('active', s.listSide === 'out');

  const currentRecords = s.listSide === 'in' ? inRecords : outRecords;
  listEl.innerHTML = currentRecords.length
    ? renderGroupedAgentRows(currentRecords, s.listSide, elapsed, isLive)
    : `<div class="empty-row">No ${s.listSide.toUpperCase()} records</div>`;

  const summary = document.getElementById(`rosterSummary${id}`);
  if (summary) {
    const m = s.meta;
    const metaText = m && m.employees !== null ? `Emp ${m.employees}/${m.employeesTotal}` : `${s.records.length} records`;
    const unknownText = s.unknownStatuses && s.unknownStatuses.length ? ` · UNK ${s.unknownStatuses.length}` : '';
    const mode = id === activeLiveLobId ? (s.liveTimerActive ? `LIVE +${formatClock(liveElapsedSec(id))}` : 'BASE') : 'PAUSED';
    summary.textContent = `${metaText}${unknownText} · ${s.listSide.toUpperCase()} ${currentRecords.length} · ${mode}`;
  }
}

function renderGroupedAgentRows(records, side, elapsed, isLive){
  const groups = groupRecordsByStatus(records, side);
  return groups.map(group => {
    const cls = statusClass(group.status);
    const head = `<div class="status-group-head ${side} ${cls}"><span>${escapeHtml(cleanStatusLabel(group.status))}</span><span class="group-count">${group.items.length}</span></div>`;
    const rows = group.items.map(r => renderAgentRow(r, elapsed, side, isLive)).join('');
    return head + rows;
  }).join('');
}

function groupRecordsByStatus(records, side){
  const order = side === 'in' ? IN_STATUS_ORDER : OUT_STATUS_ORDER;
  const buckets = new Map();
  records.forEach((rec, idx) => {
    const key = normalizeStatus(rec.status);
    if (!buckets.has(key)) buckets.set(key, { status: rec.status, firstIndex: idx, items: [] });
    buckets.get(key).items.push(rec);
  });

  return Array.from(buckets.values()).sort((a,b) => {
    const ak = normalizeStatus(a.status);
    const bk = normalizeStatus(b.status);
    const ai = order.indexOf(ak);
    const bi = order.indexOf(bk);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    return a.firstIndex - b.firstIndex;
  });
}

function renderAgentRow(rec, elapsed, side, isLive){
  const status = cleanStatusLabel(rec.status);
  const time = formatDuration(rec.seconds + elapsed);
  const liveClass = isLive ? ' live' : '';
  const stClass = statusClass(rec.status);
  const displayName = compactName(rec.name);
  return `<div class="agent-row ${side} ${stClass}${liveClass}" title="${escapeHtml(displayName)} | ${escapeHtml(rec.status)} | ${time}">
    <div class="agent-line">
      <span class="agent-name">${escapeHtml(displayName)}</span>
      <span class="agent-sep">|</span>
      <span class="agent-status">${escapeHtml(status)}</span>
      <span class="agent-sep">|</span>
      <span class="agent-time">${time}</span>
    </div>
  </div>`;
}

function statusClass(status){
  const s = normalizeStatus(status);
  if (s === 'available') return 'st-available';
  if (s === 'auxin') return 'st-auxin';
  if (s === 'auxout') return 'st-auxout';
  if (s === 'busyin') return 'st-busyin';
  if (s === 'hold') return 'st-hold';
  if (s === 'acw' || s === 'acwout') return 'st-acw';
  if (s === 'break') return 'st-break';
  if (s === 'lunch') return 'st-lunch';
  if (s === 'meeting') return 'st-meeting';
  if (s === 'personal') return 'st-personal';
  if (s === 'system problems') return 'st-sysprob';
  if (s === 'followup/outbound' || s === 'followup/outboundout') return 'st-followup';
  return 'st-other';
}

function cleanStatusLabel(status){
  return String(status || '')
    .replace(/Followup\/OutboundOUT/i, 'F/O OUT')
    .replace(/Followup\/Outbound/i, 'F/O')
    .replace(/System Problems/i, 'SysProb')
    .replace(/Available/i, 'Avail')
    .replace(/BusyIN/i, 'BusyIN')
    .replace(/AUXOUT/i, 'AUXOUT')
    .replace(/AUXIN/i, 'AUXIN');
}

function compactName(name){
  const raw = String(name || 'Unknown').replace(/\s+/g, ' ').trim();
  const full = parseAgentDisplayName(raw);
  return full || raw;
}

function parseAgentDisplayName(raw){
  const text = String(raw || '').replace(/\s+/g, ' ').trim();
  // Snapshot format: Lastname - HRID, Agent Name
  const direct = text.match(/^(.+?)\s*-\s*([0-9]+)\s*,\s*(.+)$/);
  if (direct) {
    const lastName = direct[1].trim();
    const agentName = direct[3].trim();
    if (agentName && lastName) return `${agentName} ${lastName}`.replace(/\s+/g, ' ').trim();
    return agentName || lastName;
  }

  const commaOnly = text.match(/^(.+?)\s*,\s*(.+)$/);
  if (commaOnly) {
    const lastName = commaOnly[1].trim();
    const agentName = commaOnly[2].trim();
    if (agentName && lastName) return `${agentName} ${lastName}`.replace(/\s+/g, ' ').trim();
    return agentName || lastName;
  }

  return text.replace(/\s*-\s*[0-9]+.*$/, '').trim() || text;
}

function shortName(name){
  const compact = compactName(name);
  if (compact.length <= 16) return compact;
  return compact.slice(0, 15) + '…';
}

function onReqManualInput(id){
  updatePct(id);
  renderTopRow(id);
}

function formatReqInput(id){
  const el = document.getElementById(`topReq${id}`);
  if (!el || el.value === '') return;
  const num = parseFloat(el.value);
  if (!isNaN(num)) el.value = formatReqValue(num);
}

function formatReqValue(value){
  const num = parseFloat(value);
  if (isNaN(num)) return '';
  return num.toFixed(2);
}

function clearSlot(id){
  const s = state[id-1];
  s.baseIn = 0;
  s.baseOut = 0;
  s.adjIn = 0;
  s.adjOut = 0;
  s.lockCleared = true;
  s.maxAvailSec = null;
  s.records = [];
  s.unknownStatuses = [];
  s.metaLine = '';
  s.meta = null;
  s.snapshotAt = null;
  s.liveTimerStartedAt = null;
  s.liveTimerElapsedMs = 0;
  s.liveTimerActive = false;

  document.getElementById(`topReq${id}`).value = '';
  closeLatBePanels();
  closeAutoPanels();
  refreshRow(id);
  refreshTopRows();
}

function clearMaster(){
  cancelAutoClear();

  document.getElementById('masterInput').value = '';
  masterCache = '';
  lastParseHealth = { records: 0, missing: LOBS.map(l => l.short), unknown: 0 };
  document.getElementById('autoNote').textContent = 'waiting for snapshot';
  setHeaderStatus('idle');
  closeLatBePanels();
  closeAutoPanels();

  state.forEach(s => {
    s.baseIn = 0;
    s.baseOut = 0;
    s.adjIn = 0;
    s.adjOut = 0;
    s.lockCleared = false;
    s.maxAvailSec = null;
    s.records = [];
    s.unknownStatuses = [];
    s.metaLine = '';
    s.meta = null;
    s.snapshotAt = null;
    s.liveTimerStartedAt = null;
    s.liveTimerElapsedMs = 0;
    s.liveTimerActive = false;
  });

  LOBS.forEach(l => refreshRow(l.id));
  refreshTopRows();
}

function toggleMiniPopover(event, id){
  event.stopPropagation();
  event.preventDefault();
  const pop = document.getElementById(id);
  if (!pop) return;
  document.querySelectorAll('.mini-popover.open').forEach(el => {
    if (el !== pop) el.classList.remove('open');
  });
  pop.classList.toggle('open');
}

function closeLatBePanels(){
  state.forEach(s => { s.latBePanelOpen = false; });
  document.querySelectorAll('[id^="latBePanel"]').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('[id^="latBeBtn"]').forEach(el => el.classList.remove('active'));
}

function closeAutoPanels(){
  state.forEach(s => { s.autoPanelOpen = false; });
  document.querySelectorAll('[id^="autoPanel"]').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('[id^="autoBtn"]').forEach(el => el.classList.remove('active'));
}

function toggleLatBePanel(id){
  const s = state[id-1];
  const willOpen = !s.latBePanelOpen;
  closeLatBePanels();
  if (willOpen) {
    s.latBePanelOpen = true;
    document.getElementById(`latBePanel${id}`)?.classList.add('open');
    document.getElementById(`latBeBtn${id}`)?.classList.add('active');
    closeAutoPanels();
  }
  setActiveLiveLOB(id);
}

function toggleAutoPanel(id){
  const s = state[id-1];
  const willOpen = !s.autoPanelOpen;
  closeAutoPanels();
  if (willOpen) {
    s.autoPanelOpen = true;
    document.getElementById(`autoPanel${id}`)?.classList.add('open');
    document.getElementById(`autoBtn${id}`)?.classList.add('active');
    closeLatBePanels();
  }
  setActiveLiveLOB(id);
}

function checkAllAutoSchedules(){
  // Phase 1 shell only: no schedule parsing, persistence, or timed Req updates.
}

function tickLive(){
  state.forEach(s => {
    if (s.id === activeLiveLobId && s.liveTimerActive && getLiveTimerElapsedMs(s) >= SNAPSHOT_LIVE_TIMER_MS) {
      s.liveTimerElapsedMs = SNAPSHOT_LIVE_TIMER_MS;
      s.liveTimerStartedAt = null;
      s.liveTimerActive = false;
    }
    renderTopRow(s.id);
    renderRosterList(s.id);
  });
  updateHeaderAfterTick();
}

function updateHeaderAfterTick(){
  if (document.getElementById('masterInput').value.trim()) return;
  const active = state[activeLiveLobId - 1];
  const hasSnapshot = state.some(s => s.snapshotAt);
  setHeaderStatus(active && active.liveTimerActive ? 'live' : (hasSnapshot ? 'live' : 'idle'));
}


function collectParseHealth(missingOverride){
  const missing = Array.isArray(missingOverride)
    ? missingOverride
    : LOBS.filter(l => !state[l.id-1].records.length).map(l => l.short);
  const records = state.reduce((sum, s) => sum + s.records.length, 0);
  const unknown = state.reduce((sum, s) => sum + ((s.unknownStatuses && s.unknownStatuses.length) || 0), 0);
  return { records, missing, unknown };
}

function formatParseHealth(health){
  const h = health || collectParseHealth();
  const parts = [`${h.records} rec`];
  if (h.missing && h.missing.length) parts.push(`missing ${h.missing.join('/')}`);
  if (h.unknown) parts.push(`UNK ${h.unknown}`);
  return parts.join(' · ');
}

function formatDuration(totalSec){
  if (totalSec === null || totalSec === undefined || isNaN(totalSec)) return '—';
  totalSec = Math.max(0, Math.floor(totalSec));
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const sec = totalSec % 60;
  if (h > 0) return `${pad2(h)}:${pad2(m)}:${pad2(sec)}`;
  return `${pad2(m)}:${pad2(sec)}`;
}

function formatClock(totalSec){
  totalSec = Math.max(0, Math.floor(totalSec));
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${pad2(m)}:${pad2(s)}`;
}

function pad2(n){ return String(n).padStart(2,'0'); }

function decodeEntities(s){
  return String(s)
    .replace(/&amp;/gi, '&')
    .replace(/&lt;/gi, '<')
    .replace(/&gt;/gi, '>')
    .replace(/&nbsp;/gi, ' ')
    .replace(/&#39;/gi, "'")
    .replace(/&quot;/gi, '"');
}

function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

buildPriorityRows();
buildRows();
refreshActiveUI();
refreshTopRows();
setHeaderStatus('idle');
setInterval(checkAllAutoSchedules, 15000);
setInterval(tickLive, 1000);
</script>
