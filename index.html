<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>INT 4.8 · AUX Live Final UI</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root{
  --bg:#090b10;
  --surface:#10131b;
  --surface-2:#151926;
  --card:#1a2030;
  --card-2:#20273a;
  --border:#30394f;
  --border-soft:rgba(255,255,255,0.075);
  --text:#f4f7ff;
  --muted:#8993b1;
  --soft:#b6bdd3;
  --in:#20e090;
  --out:#ff647f;
  --total:#6bb8ff;
  --accent:#ffd166;
  --warn:#ffb347;
  --in-bg:rgba(32,224,144,0.13);
  --out-bg:rgba(255,100,127,0.13);
  --total-bg:rgba(107,184,255,0.13);
  --accent-bg:rgba(255,209,102,0.13);
  --shadow:0 16px 44px rgba(0,0,0,0.44);
}

html, body { min-height:100%; }
body{
  background:
    radial-gradient(circle at 10% 0%, rgba(107,184,255,0.12), transparent 32%),
    radial-gradient(circle at 92% 12%, rgba(32,224,144,0.08), transparent 30%),
    var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:10px;
}

.app{
  width:min(430px, calc(100vw - 12px));
  background:linear-gradient(180deg, rgba(21,25,38,0.98), rgba(12,15,22,0.98));
  border:1px solid rgba(255,209,102,0.45);
  border-radius:14px;
  box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.025);
  overflow:hidden;
}

.topbar{
  display:grid;
  grid-template-columns:96px 1fr;
  gap:8px;
  padding:8px;
  background:linear-gradient(135deg, rgba(32,39,58,0.96), rgba(16,19,27,0.96));
  border-bottom:1px solid var(--border-soft);
}

.brand{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:6px;
}
.title-wrap{ display:flex; flex-direction:column; gap:1px; }
.app-title{
  font-family:Impact,'Arial Narrow',sans-serif;
  font-size:1.65rem;
  line-height:0.9;
  letter-spacing:0.11em;
  color:var(--accent);
  text-shadow:0 0 12px rgba(255,209,102,0.12);
}
.app-sub{
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.52rem;
  letter-spacing:0.08em;
  color:var(--muted);
  text-transform:uppercase;
  font-weight:900;
}

.status-pill{
  height:21px;
  border-radius:999px;
  padding:0 7px;
  display:inline-flex;
  align-items:center;
  gap:6px;
  align-self:flex-start;
  background:rgba(255,255,255,0.045);
  border:1px solid var(--border);
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.55rem;
  font-weight:900;
  text-transform:uppercase;
}
.status-pill .dot{ width:7px; height:7px; border-radius:50%; background:var(--muted); }
.status-pill.live{ color:var(--in); border-color:rgba(32,224,144,0.38); background:var(--in-bg); }
.status-pill.live .dot{ background:var(--in); box-shadow:0 0 8px rgba(32,224,144,0.9); }
.status-pill.sim{ color:var(--total); border-color:rgba(107,184,255,0.38); background:var(--total-bg); }
.status-pill.sim .dot{ background:var(--total); box-shadow:0 0 8px rgba(107,184,255,0.9); }

.capture-dock{ min-width:0; display:flex; flex-direction:column; gap:4px; }
.capture-area{
  width:100%;
  height:46px;
  min-height:38px;
  max-height:80px;
  resize:vertical;
  background:#0b0e15;
  border:1px solid rgba(107,184,255,0.24);
  border-radius:8px;
  color:var(--text);
  outline:none;
  padding:6px 7px;
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.61rem;
  line-height:1.28;
  font-weight:800;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.015);
}
.capture-area:focus{ border-color:rgba(107,184,255,0.58); box-shadow:0 0 0 2px rgba(107,184,255,0.1), inset 0 0 0 1px rgba(255,255,255,0.02); }
.capture-area::placeholder{ color:rgba(182,189,211,0.55); }
.capture-foot{ display:flex; align-items:center; gap:6px; }
.auto-note{
  flex:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.55rem;
  font-weight:800;
}
.auto-note .cnt{ color:var(--accent); }
.auto-note .good{ color:var(--in); }
.auto-note .blue{ color:var(--total); }
.top-btn{
  height:22px;
  padding:0 8px;
  border-radius:6px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--soft);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.54rem;
  font-weight:900;
  cursor:pointer;
  transition:all 0.12s;
}
.top-btn:hover{ border-color:var(--out); color:var(--out); background:var(--out-bg); }

.focus-panel{
  padding:7px 8px 8px;
  border-bottom:1px solid var(--border-soft);
  background:rgba(0,0,0,0.13);
}
.focus-head{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:6px;
  align-items:center;
  margin-bottom:6px;
}
.focus-title{
  font-family:Consolas,'SFMono-Regular',monospace;
  color:var(--soft);
  font-size:0.56rem;
  font-weight:900;
  letter-spacing:0.08em;
  text-transform:uppercase;
  white-space:nowrap;
}
.sim-switch{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:5px;
}
.sim-switch-btn{
  height:25px;
  border-radius:7px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.035);
  color:var(--muted);
  cursor:pointer;
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.56rem;
  font-weight:900;
  transition:all 0.12s;
}
.sim-switch-btn.active{ color:var(--total); border-color:rgba(107,184,255,0.55); background:var(--total-bg); box-shadow:0 0 0 1px rgba(107,184,255,0.06); }

.priority-rows{ display:flex; flex-direction:column; gap:5px; }
.priority-row{
  display:grid;
  grid-template-columns:48px 52px 40px 48px 42px 63px 31px 34px;
  gap:4px;
  align-items:center;
  min-width:0;
  padding:5px;
  border:1px solid var(--border-soft);
  background:rgba(255,255,255,0.035);
  border-radius:9px;
}
.priority-row.active{ border-color:rgba(107,184,255,0.45); background:linear-gradient(90deg, rgba(107,184,255,0.11), rgba(255,255,255,0.035)); }
.pr-lob{
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:7px;
  border:1px solid var(--border);
  background:var(--card-2);
  color:var(--text);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.57rem;
  font-weight:900;
  white-space:nowrap;
}
.req-target{
  height:28px;
  width:100%;
  background:#0b0e15;
  border:1px solid var(--border);
  border-radius:7px;
  color:var(--accent);
  outline:none;
  text-align:center;
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.78rem;
  font-weight:900;
  -moz-appearance:textfield;
}
.req-target::-webkit-outer-spin-button,
.req-target::-webkit-inner-spin-button{ -webkit-appearance:none; }
.req-target:focus{ border-color:rgba(255,209,102,0.66); box-shadow:0 0 0 2px rgba(255,209,102,0.1); }
.auto-req-btn{
  height:28px;
  border-radius:7px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--soft);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.51rem;
  font-weight:900;
  cursor:pointer;
  transition:all 0.12s;
}
.auto-req-btn:hover,
.auto-req-btn.active{ border-color:rgba(107,184,255,0.58); color:var(--total); background:var(--total-bg); }
.pr-mini{
  min-width:0;
  height:28px;
  border-radius:7px;
  border:1px solid transparent;
  background:rgba(0,0,0,0.14);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  line-height:1;
}
.pr-mini small{
  display:block;
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.42rem;
  font-weight:900;
  letter-spacing:0.06em;
  text-transform:uppercase;
  margin-bottom:2px;
}
.pr-mini strong{
  display:block;
  font-family:Impact,'Arial Narrow',sans-serif;
  font-weight:400;
  font-size:1.06rem;
  letter-spacing:0.03em;
  color:var(--soft);
  line-height:0.9;
}
.pr-mini.pct.good{ border-color:rgba(32,224,144,0.36); background:var(--in-bg); }
.pr-mini.pct.good strong{ color:var(--in); }
.pr-mini.pct.bad{ border-color:rgba(255,100,127,0.36); background:var(--out-bg); }
.pr-mini.pct.bad strong{ color:var(--out); }
.pr-mini.heads strong{ color:var(--accent); }
.pr-mini.heads.zero strong{ color:var(--muted); }
.pr-mini.avail strong{ color:var(--accent); font-size:0.95rem; }
.pr-mini.in strong{ color:var(--in); }
.pr-mini.out strong{ color:var(--out); }

.lob-list{ padding:8px 8px 10px; display:flex; flex-direction:column; gap:8px; }
.lob-card{
  background:linear-gradient(180deg, rgba(26,32,48,0.98), rgba(16,19,27,0.98));
  border:1px solid var(--border);
  border-radius:12px;
  padding:8px;
  overflow:hidden;
  position:relative;
}
.lob-card.active{ border-color:rgba(107,184,255,0.48); box-shadow:0 0 0 1px rgba(107,184,255,0.05); }
.lob-card::before{
  content:'';
  position:absolute;
  inset:0 0 auto 0;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(107,184,255,0.42), transparent);
  opacity:0.55;
}
.lob-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  margin-bottom:7px;
}
.lob-id{ display:flex; align-items:center; gap:7px; min-width:0; }
.lob-name{
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.74rem;
  font-weight:900;
  color:var(--text);
  background:var(--card-2);
  border:1px solid var(--border);
  border-radius:7px;
  padding:4px 8px;
  letter-spacing:0.02em;
  white-space:nowrap;
}
.lob-meta{
  min-width:0;
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.54rem;
  line-height:1.4;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.lob-actions{ display:flex; align-items:center; gap:5px; flex-shrink:0; }
.sim-chip{
  min-width:58px;
  height:25px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:999px;
  background:rgba(255,255,255,0.035);
  border:1px solid var(--border);
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.55rem;
  font-weight:900;
  text-transform:uppercase;
}
.sim-chip.active{ color:var(--total); border-color:rgba(107,184,255,0.44); background:var(--total-bg); }
.sim-chip.frozen{ color:var(--muted); }
.clear-btn{
  height:25px;
  width:26px;
  border-radius:7px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.58rem;
  font-weight:900;
  cursor:pointer;
  transition:all 0.12s;
}
.clear-btn:hover{ border-color:rgba(255,100,127,0.6); color:var(--out); background:var(--out-bg); }

.auto-panel{
  display:none;
  margin-bottom:7px;
  padding:7px;
  border-radius:9px;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.18);
}
.auto-panel.open{ display:block; }
.auto-panel-hint{
  margin-bottom:5px;
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.55rem;
  line-height:1.42;
  font-weight:800;
}
.auto-panel-hint b{ color:var(--text); }
.auto-textarea{
  width:100%;
  height:62px;
  resize:vertical;
  min-height:44px;
  max-height:150px;
  border-radius:7px;
  border:1px solid var(--border);
  background:#0b0e15;
  color:var(--text);
  padding:6px 7px;
  outline:none;
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.61rem;
  line-height:1.35;
  font-weight:800;
}
.auto-textarea:focus{ border-color:rgba(107,184,255,0.55); }
.auto-status{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  margin-top:5px;
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.54rem;
  line-height:1.35;
  font-weight:900;
}
.auto-status .next-time{ color:var(--total); }
.auto-status .err{ color:var(--out); }
.auto-clear-btn{
  height:22px;
  padding:0 7px;
  border-radius:5px;
  border:1px solid var(--border);
  background:#0b0e15;
  color:var(--soft);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.52rem;
  font-weight:900;
  cursor:pointer;
}
.auto-clear-btn:hover{ border-color:rgba(255,100,127,0.6); color:var(--out); background:var(--out-bg); }

.metric-grid{
  display:grid;
  grid-template-columns:1.05fr 0.75fr 0.88fr 0.82fr 0.82fr;
  gap:6px;
  margin-bottom:7px;
}
.metric{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border-soft);
  border-radius:9px;
  padding:5px;
  min-width:0;
  text-align:center;
}
.metric-label{
  display:flex;
  justify-content:center;
  gap:4px;
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.48rem;
  font-weight:900;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:3px;
  white-space:nowrap;
}
.metric.pct.good{ border-color:rgba(32,224,144,0.36); background:var(--in-bg); }
.metric.pct.bad{ border-color:rgba(255,100,127,0.36); background:var(--out-bg); }
.metric.pct.good .val-pct{ color:var(--in); }
.metric.pct.bad .val-pct{ color:var(--out); }
.metric.heads .val-heads{ color:var(--accent); }
.metric.heads .val-heads.zero{ color:var(--muted); }
.metric.avail .live-time{ color:var(--accent); font-size:1.18rem; }
.metric.in .metric-label, .metric.in .val-num{ color:var(--in); }
.metric.out .metric-label, .metric.out .val-num{ color:var(--out); }
.val-pct,
.val-heads,
.val-num{
  font-family:Impact,'Arial Narrow',sans-serif;
  font-weight:400;
  font-size:1.38rem;
  line-height:0.95;
  letter-spacing:0.04em;
  color:var(--soft);
}
.val-sub{
  margin-top:3px;
  font-family:Consolas,'SFMono-Regular',monospace;
  color:var(--muted);
  font-size:0.49rem;
  font-weight:900;
}
.val-sub .pos{ color:var(--total); }
.val-sub .neg{ color:var(--out); }
.metric-main{ display:flex; align-items:center; justify-content:center; gap:3px; }
.adj-btn{
  width:19px;
  height:19px;
  border-radius:5px;
  border:1px solid var(--border);
  background:#0b0e15;
  color:var(--soft);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.78rem;
  font-weight:900;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  transition:all 0.1s;
}
.metric.in .adj-btn:hover{ border-color:rgba(32,224,144,0.58); color:var(--in); background:var(--in-bg); }
.metric.out .adj-btn:hover{ border-color:rgba(255,100,127,0.58); color:var(--out); background:var(--out-bg); }
.adj-btn:active{ transform:scale(0.92); }
.num-stack{ min-width:26px; display:flex; flex-direction:column; align-items:center; line-height:1; }
.live-name-mini{
  margin-top:3px;
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.47rem;
  font-weight:800;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.live-grid{
  display:grid;
  grid-template-columns:1fr 1fr 0.95fr;
  gap:6px;
  margin-bottom:7px;
}
.live-card{
  min-width:0;
  border:1px solid var(--border-soft);
  border-radius:9px;
  background:rgba(0,0,0,0.15);
  padding:6px 6px 5px;
}
.live-label{
  display:flex;
  justify-content:space-between;
  gap:5px;
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.48rem;
  font-weight:900;
  letter-spacing:0.07em;
  text-transform:uppercase;
  white-space:nowrap;
}
.live-label .tag-in{ color:var(--in); }
.live-label .tag-out{ color:var(--out); }
.live-label .tag-avail{ color:var(--accent); }
.live-time{
  display:block;
  margin-top:2px;
  font-family:Impact,'Arial Narrow',sans-serif;
  font-size:1.28rem;
  line-height:1;
  letter-spacing:0.04em;
  color:var(--soft);
  white-space:nowrap;
}
.live-card.in .live-time{ color:var(--in); }
.live-card.out .live-time{ color:var(--out); }
.live-card.avail .live-time{ color:var(--accent); }
.live-name{
  margin-top:3px;
  color:var(--muted);
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.49rem;
  font-weight:800;
  line-height:1.25;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.strip{
  display:flex;
  gap:5px;
  overflow-x:auto;
  padding-bottom:1px;
  scrollbar-width:thin;
}
.strip::-webkit-scrollbar{ height:5px; }
.strip::-webkit-scrollbar-thumb{ background:var(--border); border-radius:999px; }
.person-chip{
  flex:0 0 auto;
  max-width:150px;
  border-radius:999px;
  border:1px solid var(--border-soft);
  background:rgba(255,255,255,0.035);
  color:var(--soft);
  padding:4px 7px;
  font-family:Consolas,'SFMono-Regular',monospace;
  font-size:0.5rem;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.person-chip.in{ border-color:rgba(32,224,144,0.28); color:var(--in); background:rgba(32,224,144,0.08); }
.person-chip.out{ border-color:rgba(255,100,127,0.28); color:var(--out); background:rgba(255,100,127,0.08); }
.person-chip.empty{ color:var(--muted); }

@media (max-width:405px){
  .app{ width:calc(100vw - 8px); }
  .topbar{ grid-template-columns:88px 1fr; padding:7px; }
  .app-title{ font-size:1.48rem; }
  .priority-row{ grid-template-columns:44px 48px 38px 46px 39px 58px 29px 32px; gap:3px; padding:4px; }
  .pr-mini small{ font-size:0.38rem; }
  .pr-mini strong{ font-size:0.98rem; }
  .metric-grid{ grid-template-columns:1fr 0.72fr 0.88fr; }
  .live-grid{ grid-template-columns:1fr; }
}


/* ---------- INT 4.5 focus-list redesign ---------- */
.app{
  width:min(520px, calc(100vw - 12px));
  height:min(920px, calc(100vh - 12px));
  display:flex;
  flex-direction:column;
}
.topbar{
  grid-template-columns:100px 1fr;
  gap:9px;
  padding:9px;
  flex:0 0 auto;
}
.app-title{ font-size:1.9rem; }
.capture-area{
  height:52px;
  font-size:0.66rem;
  line-height:1.24;
}
.focus-panel{
  flex:0 0 auto;
  padding:9px;
  min-height:258px;
}
.focus-head{ margin-bottom:8px; }
.sim-switch-btn{
  height:31px;
  font-size:0.68rem;
  border-radius:9px;
}
.priority-rows{ gap:8px; }
.priority-row{

const IN_KW  = new Set(['auxin','auxout','available','followup/outboundout','hold','busyin','acw','acwout']);

const LOBS = [
  { id: 1, key:'T2', label: 'CSA T2', short: 'T2', aliases: ['csa tier2','csa t2','t2','tier2'] },
  { id: 2, key:'SP', label: 'CSA SP', short: 'SP', aliases: ['csa sp','sp','spanish','spa'] },

];

const state = LOBS.map(l => newLobState(l));

function newLobState(l){ return {
  id:l.id, key:l.key, baseIn:0, baseOut:0, officialIn:0, officialOut:0, lockCleared:false, maxAvailSec:null,
  records:[], metaLine:'', meta:null, snapshotAt:null, autoPanelOpen:false,
  latReq:0, beReq:0, currentInterval:null, finalizedIntervals:[], samples:[],
  req92PctRaw:null, bePctRaw:null, latPctRaw:null, expectedLatPctRaw:null, beLatPctRaw:null, expectedBePctRaw:null,
  manualLatSegment:null, manualBeSegment:null, temporaryManualInDelta:0, temporaryManualInStartedAt:null, temporaryManualInLastChangedAt:null,
  lastValidSnapshotAt:null, freezeStartedAt:null, isStale:false, isFrozen:false, isLocked:false, mode:'RESET', lastParsedSnapshotSignature:null,
  autoReqSchedule:{ latReqSchedule:[], beReqSchedule:[] }, autoConfirmed:false, parseHealth:[]
}; }

const IN_STATUS_ORDER = ['available','auxin','auxout','busyin','acw','acwout','hold','followup/outboundout'];
const OUT_STATUS_ORDER = ['break','lunch','meeting','personal','system problems','followup/outbound','coaching','nps','project','auxwk'];

function injectLatBeStyles(){ const st=document.createElement('style'); st.textContent=`
.latbe-panel{border:1px solid var(--border-soft);border-radius:12px;background:rgba(0,0,0,.16);padding:8px;margin-bottom:9px;font-family:Consolas,'SFMono-Regular',monospace}.latbe-status{padding:7px 10px;border-bottom:1px solid var(--border-soft);font:900 .58rem Consolas,'SFMono-Regular',monospace;color:var(--warn);background:rgba(255,179,71,.08)}.latbe-global-actions{display:flex;gap:6px;padding:7px 10px;border-bottom:1px solid var(--border-soft)}.latbe-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.latbe-metric{border:1px solid var(--border-soft);border-radius:8px;padding:5px;text-align:center;background:rgba(255,255,255,.035);min-width:0}.latbe-metric small{display:block;color:var(--muted);font-size:.45rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.latbe-metric strong{display:block;color:var(--soft);font:900 1rem Consolas,'SFMono-Regular',monospace;white-space:nowrap}.latbe-metric.good strong{color:var(--in)}.latbe-metric.bad strong{color:var(--out)}.latbe-controls{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:7px 0}.latbe-controls input{width:100%;height:26px;border-radius:7px;border:1px solid var(--border);background:#0b0e15;color:var(--accent);text-align:center;font:900 .72rem Consolas,'SFMono-Regular',monospace}.latbe-controls button,.latbe-global-actions button,.auto-save-btn{height:26px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--soft);font:900 .52rem Consolas,'SFMono-Regular',monospace;cursor:pointer}.be-section{margin-top:7px}.be-section.hidden{display:none}.whatif{margin-top:6px;color:var(--total);font-size:.52rem;font-weight:900}.health{margin-top:6px;color:var(--warn);font-size:.52rem;line-height:1.35;font-weight:900}.locked-screen{padding:14px;margin:10px;border:1px solid rgba(255,100,127,.45);border-radius:12px;background:var(--out-bg);color:var(--out);font-weight:900;text-align:center}.auto-table{width:100%;border-collapse:collapse;margin-top:6px}.auto-table th,.auto-table td{border:1px solid var(--border-soft);padding:3px;text-align:center;font-size:.48rem}.auto-table input{width:100%;background:#0b0e15;border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.52rem;text-align:center}.auto-tools{display:flex;gap:5px;margin-top:6px;align-items:center;flex-wrap:wrap}.auto-tools span{color:var(--muted);font-size:.52rem;font-weight:900}@media(max-width:480px){.latbe-grid{grid-template-columns:repeat(2,1fr)}.latbe-controls{grid-template-columns:1fr}.auto-table th,.auto-table td{font-size:.42rem;padding:2px}}`; document.head.appendChild(st); }

function buildSimSwitch(){ document.getElementById('simSwitch').innerHTML = LOBS.map(l => `<button class="sim-switch-btn" id="simSwitch${l.id}" onclick="setActiveSimLOB(${l.id})">${l.short}</button>`).join(''); }
function buildPriorityRows(){ document.getElementById('priorityRows').innerHTML = LOBS.map(l => `<div class="priority-row" id="priorityRow${l.id}"><button class="pr-lob" onclick="setActiveSimLOB(${l.id})">${l.short}</button><input class="req-target" id="topReq${l.id}" type="number" min="0" step="0.01" placeholder="LAT" oninput="onReqManualInput(${l.id})" onkeydown="handleReqTab(event, ${l.id})"><input class="req-target" id="topBeReq${l.id}" type="number" min="0" max="6" step="1" placeholder="BE" oninput="onBeReqManualInput(${l.id})"><button class="auto-req-btn" id="autoBtn${l.id}" onclick="toggleAutoPanel(${l.id})">AUTO</button><div class="pr-mini pct" id="topPctTile${l.id}"><small>REQ92</small><strong id="topPct${l.id}">—</strong></div><div class="pr-mini heads" id="topHeadsTile${l.id}"><small>HEAD</small><strong id="topHeads${l.id}">—</strong></div><div class="pr-mini in"><small>IN</small><strong id="topIn${l.id}">0</strong></div><div class="pr-mini out"><small>OUT</small><strong id="topOut${l.id}">0</strong></div></div>`).join(''); }
function intervalRows(){ let rows=''; for(let i=1;i<=32;i++){ const t=intervalStartLabel(i); rows+=`<tr><td>${i}</td><td>${t}</td><td><input data-interval="${i}" data-kind="lat" placeholder="LAT"></td><td><input data-interval="${i}" data-kind="be" placeholder="0-6"></td></tr>`; } return rows; }
function buildRows(){ const c=document.getElementById('lobs'); LOBS.forEach(l=>{ const s=state[l.id-1], b=document.createElement('div'); b.className='lob-card'; b.id=`lobBlock${s.id}`; b.innerHTML=`<div class="lob-head"><div class="lob-id"><span class="lob-name">${l.label}</span><span class="lob-meta" id="lobMeta${s.id}">no snapshot</span></div><div class="lob-actions"><span class="sim-chip" id="simChip${s.id}">RESET</span><button class="clear-btn" onclick="clearSlot(${s.id})">×</button></div></div><div class="auto-panel" id="autoPanel${s.id}"><div class="auto-panel-hint"><b>Auto Req Schedule</b>: per 30-minute interval. LAT decimal, BE integer 0–6. Saved locally.</div><div class="auto-tools"><button class="auto-save-btn" onclick="saveScheduleFromPanel(${s.id})">SAVE SCHEDULE</button><button class="auto-clear-btn" onclick="clearAutoSchedule(${s.id})">CLEAR</button><button class="auto-save-btn" onclick="confirmStoredScheduleReuse()">CONFIRM REUSE</button><span id="autoStatus${s.id}">not loaded</span></div><table class="auto-table"><thead><tr><th>#</th><th>Start</th><th>LAT</th><th>BE</th></tr></thead><tbody id="autoTbody${s.id}">${intervalRows()}</tbody></table></div><div class="latbe-panel"><div class="latbe-grid"><div class="latbe-metric"><small>INTERVAL</small><strong id="lbInterval${s.id}">—</strong></div><div class="latbe-metric"><small>MODE</small><strong id="lbMode${s.id}">RESET</strong></div><div class="latbe-metric"><small>REQ92%</small><strong id="lbReq92${s.id}">—</strong></div><div class="latbe-metric"><small>LAT%</small><strong id="lbLat${s.id}">—</strong></div><div class="latbe-metric"><small>EXP LAT%</small><strong id="lbExpLat${s.id}">—</strong></div><div class="latbe-metric"><small>92% HEAD</small><strong id="lbHead${s.id}">—</strong></div></div><div class="latbe-controls"><input id="manualLat${s.id}" placeholder="Manual LAT%"><button onclick="applyManualPct(${s.id}, 'LAT')">APPLY LAT</button><input id="whatIf${s.id}" type="number" min="-20" max="20" step="1" value="0" oninput="setWhatIf(${s.id})"><button onclick="resetWhatIf(${s.id})">RESET TEMP IN</button></div><div class="be-section hidden" id="beSection${s.id}"><div class="latbe-grid"><div class="latbe-metric"><small>BE%</small><strong id="lbBePct${s.id}">—</strong></div><div class="latbe-metric"><small>BE LAT%</small><strong id="lbBeLat${s.id}">—</strong></div><div class="latbe-metric"><small>EXP BE%</small><strong id="lbExpBe${s.id}">—</strong></div><div class="latbe-metric"><small>BE HEAD</small><strong id="lbBeHead${s.id}">—</strong></div></div><div class="latbe-controls"><input id="manualBe${s.id}" placeholder="Manual BE%"><button onclick="applyManualPct(${s.id}, 'BE')">APPLY BE</button></div></div><div class="whatif" id="whatIfDisplay${s.id}"></div><div class="health" id="health${s.id}"></div></div><div class="roster-panel"><div class="roster-toolbar"><div class="roster-title">AGENT LIST</div><div class="list-toggle"><button class="list-toggle-btn in" id="listBtnIn${s.id}" onclick="setListSide('in')">IN <span id="inListCount${s.id}">0</span></button><button class="list-toggle-btn out" id="listBtnOut${s.id}" onclick="setListSide('out')">OUT <span id="outListCount${s.id}">0</span></button></div></div><div class="roster-summary" id="rosterSummary${s.id}">paste snapshot to load</div><div class="roster-table single" id="agentList${s.id}"><div class="empty-row">No records</div></div></div>`; c.appendChild(b); }); }
function addGlobalPanels(){ document.querySelector('.focus-panel').insertAdjacentHTML('beforebegin', `<div class="latbe-status" id="storageStatus"></div><div class="latbe-global-actions"><button onclick="refreshStartOver()">REFRESH / START OVER</button><button onclick="confirmStoredScheduleReuse()">CONFIRM SAVED SCHEDULE</button></div><div id="lockScreen" class="locked-screen" style="display:none">Session ended. Please refresh the page to start a new day.</div>`); }

function masterChanged(){ const raw=document.getElementById('masterInput').value; if(raw!==masterCache){ state.forEach(s=>s.lockCleared=false); masterCache=raw; } if(raw.trim()){ reparse(true); scheduleAutoClear(); setHeaderStatus('parsed'); } else { setHeaderStatus('idle'); document.getElementById('autoNote').textContent='waiting for snapshot'; } }
function scheduleAutoClear(){ if(clearTimerHandle)clearTimeout(clearTimerHandle); if(clearCountdownHandle)clearInterval(clearCountdownHandle); const note=document.getElementById('autoNote'), raw=document.getElementById('masterInput').value; if(!raw.trim()){note.textContent='waiting for snapshot';return;} let r=10; note.innerHTML=`<span class="good">parsed</span> · input clears in <span class="cnt">${r}s</span>`; clearCountdownHandle=setInterval(()=>{r--; if(r>0)note.innerHTML=`<span class="good">parsed</span> · input clears in <span class="cnt">${r}s</span>`;},1000); clearTimerHandle=setTimeout(()=>{clearInterval(clearCountdownHandle); clearCountdownHandle=null; clearTimerHandle=null; document.getElementById('masterInput').value=''; masterCache=''; note.innerHTML=`<span class="blue">snapshot kept</span> · LAT/BE tracking live`; setHeaderStatus('sim');}, CLEAR_DELAY_MS); }
function setHeaderStatus(mode){ const w=document.getElementById('hdrStatus'), t=document.getElementById('hdrStatusTxt'); w.classList.remove('live','sim'); if(mode==='parsed'){w.classList.add('live');t.textContent='parsed';} else if(mode==='sim'){w.classList.add('sim');t.textContent='live';} else t.textContent='idle'; }
function setListSide(side){ activeListSide=side==='out'?'out':'in'; LOBS.forEach(l=>renderRosterList(l.id)); }
function handleReqTab(event,id){ if(event.key!=='Tab')return; const ids=LOBS.map(l=>l.id), idx=ids.indexOf(id); event.preventDefault(); const n=ids[(idx+(event.shiftKey?-1:1)+ids.length)%ids.length]; document.getElementById(`topReq${n}`)?.focus(); }
function setActiveSimLOB(id){ activeSimLobId=id; refreshActiveUI(); LOBS.forEach(l=>{renderSimChip(l.id);renderTopRow(l.id);renderRosterList(l.id);}); }
function refreshActiveUI(){ LOBS.forEach(l=>{ const a=l.id===activeSimLobId; document.getElementById(`simSwitch${l.id}`)?.classList.toggle('active',a); document.getElementById(`priorityRow${l.id}`)?.classList.toggle('active',a); document.getElementById(`lobBlock${l.id}`)?.classList.toggle('active',a); }); }

function reparse(resetSim){ const now=Date.now(), raw=document.getElementById('masterInput').value, lines=decodeEntities(raw).split(/\r?\n/).map(l=>l.trim()).filter(Boolean); let anyValid=false, globalRecords=[]; LOBS.forEach(l=>{ const s=state[l.id-1], data=extractLOBData(lines,l.aliases); const parsed=(!data||s.lockCleared)?parseSegment([], ''):parseSegment(data.block, data.metaLine); ingestParsed(l.id, parsed, data?data.metaLine:'', resetSim, now); if(parsed.records.length){anyValid=true; parsed.records.forEach(r=>globalRecords.push({...r,lob:l.key}));} }); const sig=signatureFor(globalRecords); const duplicate=anyValid && sig && sig===lastGlobalSignature; state.forEach(s=>{ if(anyValid){ if(s.records.length) addSnapshotSample(s, now, duplicate?'duplicate':'paste'); if(!duplicate && s.records.length) s.lastValidSnapshotAt=now; if(s.temporaryManualInDelta) resetWhatIf(s.id); if(duplicate) s.parseHealth.push('Duplicate snapshot'); } }); if(anyValid && !duplicate) lastGlobalSignature=sig; if(!anyValid) state.forEach(s=>s.parseHealth.push('Fully invalid paste rejected')); refreshTopRows(); renderAll(); }
function extractLOBData(lines, aliases){ const set=new Set(aliases.map(a=>a.toLowerCase())); for(let i=0;i<lines.length;i++){ if(set.has(normalizeLobLabel(lines[i]))){ let j=i+1; while(j<lines.length&&!/^employees\s*:/i.test(lines[j])&&!LOBS.some(l=>l.aliases.includes(normalizeLobLabel(lines[j]))))j++; return {block:lines.slice(i+1,j),metaLine:j<lines.length&&/^employees\s*:/i.test(lines[j])?lines[j]:''}; } } return null; }
function normalizeLobLabel(line){ return String(line).toLowerCase().replace(/\s+/g,' ').trim().replace(/\s*actions\s*$/i,''); }
function normalizeStatus(line){ return String(line).toLowerCase().replace(/\s+/g,' ').trim(); }
function classifyStatus(line){ const lower=normalizeStatus(line); if(IN_KW.has(lower))return 'in'; if(OUT_KW.has(lower))return 'out'; if(/[a-z]in$/i.test(lower)||/[a-z]out$/i.test(lower))return 'in'; return null; }
function parseDurationToSec(value){ const m=String(value||'').trim().match(/^(\d{1,2}):(\d{2}):(\d{2})$/); if(!m)return null; return (+m[1])*3600+(+m[2])*60+(+m[3]); }

function ingestParsed(id, parsed, metaLine, resetSim, now){ const s=state[id-1]; s.baseIn=parsed.records.filter(r=>r.side==='in').length; s.baseOut=parsed.records.filter(r=>r.side==='out').length; s.officialIn=s.baseIn; s.officialOut=s.baseOut; s.records=parsed.records; s.metaLine=metaLine||''; s.meta=parsed.meta; s.maxAvailSec=null; parsed.records.forEach(r=>{ if(normalizeStatus(r.status)==='available'&&(s.maxAvailSec===null||r.seconds>s.maxAvailSec))s.maxAvailSec=r.seconds; }); s.snapshotAt=parsed.records.length?new Date(now):s.snapshotAt; s.parseHealth=parsed.health.slice(); if(parsed.records.length&&parsed.excluded) s.parseHealth.push('Partial invalid paste processed valid records'); refreshRow(id); }
function signatureFor(records){ if(!records.length)return ''; return records.map(r=>[r.lob,compactName(r.name).toLowerCase(),normalizeStatus(r.status),r.seconds,r.side].join('|')).sort().join('||'); }

function getWindowInfo(nowMs=Date.now()){ const d=new Date(nowMs), h=d.getHours(), m=d.getMinutes(), min=h*60+m; if(min>=15*60){ const start=new Date(d); start.setHours(15,0,0,0); const end=new Date(start); end.setDate(end.getDate()+1); end.setHours(7,0,0,0); const lock=new Date(start); lock.setDate(lock.getDate()+1); lock.setHours(7,15,0,0); return buildWindow(nowMs,start,end,lock); } const start=new Date(d); start.setDate(start.getDate()-1); start.setHours(15,0,0,0); const end=new Date(d); end.setHours(7,0,0,0); const lock=new Date(d); lock.setHours(7,15,0,0); return buildWindow(nowMs,start,end,lock); }
function buildWindow(nowMs,start,end,lock){ const upcoming=new Date(start); if(nowMs>=lock.getTime()){ upcoming.setDate(upcoming.getDate()+1); } const inWin=nowMs>=start.getTime()&&nowMs<end.getTime(); const hold=nowMs>=end.getTime()&&nowMs<lock.getTime(); const isLock=nowMs>=lock.getTime()&&nowMs<new Date(lock).setHours(15,0,0,0); let interval=null; if(inWin){ const elapsed=Math.floor((nowMs-start.getTime())/1000), id=Math.floor(elapsed/INTERVAL_SECONDS)+1; const is=new Date(start.getTime()+(id-1)*INTERVAL_SECONDS*1000), ie=new Date(is.getTime()+INTERVAL_SECONDS*1000); interval={id,start:is,end:ie}; } else if(hold){ const is=new Date(end.getTime()-INTERVAL_SECONDS*1000); interval={id:32,start:is,end:new Date(end)}; } return {start,end,lock,inWindow:inWin,holdGap:hold,isLock,interval,operatingWindowDate:ymd(upcoming)}; }
function ensureInterval(s, now=Date.now()){ const w=getWindowInfo(now); if(w.isLock){ lockSession(); return; } if(!w.inWindow&&!w.holdGap){ s.mode='OUTSIDE_WINDOW'; s.currentInterval=null; return; } if(w.holdGap){ s.mode=s.isFrozen?'FROZEN':'AUTO'; if(!s.currentInterval) s.currentInterval=w.interval; return; } if(s.isFrozen||s.isLocked)return; if(!s.currentInterval||s.currentInterval.id!==w.interval.id||s.currentInterval.start.getTime()!==w.interval.start.getTime()){ if(s.currentInterval) finalizeInterval(s, now); s.currentInterval=w.interval; s.samples=[]; s.manualLatSegment=null; s.manualBeSegment=null; resetWhatIf(s.id); applyAutoReqForInterval(s, w.interval.id, now); if(s.officialIn||s.officialOut) addSnapshotSample(s, w.interval.start.getTime(), 'rollover'); s.mode=s.samples.length?'AUTO':'AUTO'; } }
function addSnapshotSample(s, at, source){ ensureInterval(s, at); if(!s.currentInterval||s.mode==='OUTSIDE_WINDOW'||s.isFrozen||s.isLocked)return; s.samples.push({timestamp:at, officialIn:s.officialIn, officialOut:s.officialOut, latReq:s.latReq, beReq:s.beReq, source}); if(s.samples.length===1 && at>s.currentInterval.start.getTime()+1000) s.mode='ASSUMED'; recalcLob(s, at); }
function finalizeInterval(s, now){ recalcLob(s, Math.min(now, s.currentInterval.end.getTime())); s.finalizedIntervals.push({intervalId:s.currentInterval.id,lobId:s.key,intervalStart:s.currentInterval.start.toISOString(),intervalEnd:s.currentInterval.end.toISOString(),finalReq92PctRaw:s.req92PctRaw,finalLatPctRaw:s.latPctRaw,finalExpectedLatPctRaw:s.expectedLatPctRaw,finalBePctRaw:s.bePctRaw,finalBeLatPctRaw:s.beLatPctRaw,finalExpectedBePctRaw:s.expectedBePctRaw,latReq:s.latReq,beReq:s.beReq,officialIn:s.officialIn,officialOut:s.officialOut,sampleCount:s.samples.length,hadManualLatCorrection:!!s.manualLatSegment,manualLatPctRaw:s.manualLatSegment?.valueRaw??null,hadManualBeCorrection:!!s.manualBeSegment,manualBePctRaw:s.manualBeSegment?.valueRaw??null,wasAssumed:s.mode==='ASSUMED',wasFrozen:s.isFrozen,wasOutsideWindow:s.mode==='OUTSIDE_WINDOW'}); }
function recalcLob(s, now=Date.now()){ ensureInterval(s, now); if(!s.currentInterval||s.isFrozen||s.isLocked||s.mode==='OUTSIDE_WINDOW')return; const elapsed=Math.max(0, Math.min((now-s.currentInterval.start.getTime())/1000, INTERVAL_SECONDS)); const rem=Math.max(0, (s.currentInterval.end.getTime()-now)/1000); s.req92PctRaw=validLat(s.latReq)?(s.officialIn/s.latReq*100):null; s.bePctRaw=validBe(s.latReq,s.beReq)?(s.officialIn/(s.latReq+s.beReq)*100):null; s.latPctRaw=weighted(s,'LAT',elapsed,now,false); s.expectedLatPctRaw=weighted(s,'LAT',INTERVAL_SECONDS,now,true,rem); s.beLatPctRaw=weighted(s,'BE',elapsed,now,false); s.expectedBePctRaw=weighted(s,'BE',INTERVAL_SECONDS,now,true,rem); }
function weighted(s, metric, denom, now, expected, rem=0){ const valid=metric==='LAT'?validLat(s.latReq):validBe(s.latReq,s.beReq); if(!valid||denom<=0)return null; const start=s.currentInterval.start.getTime(), endLimit=now; const manual=metric==='LAT'?s.manualLatSegment:s.manualBeSegment; let sum=0, coveredTo=start; if(manual){ const mt=Math.min(manual.appliedAt,endLimit); if(mt>start){ sum+=manual.valueRaw*((mt-start)/1000); coveredTo=mt; } }

function validLat(v){ return Number.isFinite(+v)&&+v>0; } function validBe(lat,be){ return Number.isFinite(+lat)&&Number.isFinite(+be)&&(+lat + +be)>0; }
function applyManualPct(id, metric){ const s=state[id-1], input=document.getElementById(metric==='LAT'?`manualLat${id}`:`manualBe${id}`); const v=parseFloat(input.value); if(!Number.isFinite(v)||v<0){ alert('Enter a valid manual percentage.'); return; } ensureInterval(s); if(!s.currentInterval){ alert('Manual corrections require an active interval.'); return; } const seg={metric,lobId:s.key,valueRaw:v,intervalStart:s.currentInterval.start.toISOString(),appliedAt:Date.now(),source:'manual'}; if(metric==='LAT')s.manualLatSegment=seg; else s.manualBeSegment=seg; s.mode='MANUAL'; recalcLob(s); renderAll(); }

function formatPct(v){ return v===null||v===undefined||!Number.isFinite(v)?'—':`${v.toFixed(2)}%`; } function head92(s){ if(!validLat(s.latReq))return '—'; const req=Math.ceil(.92*s.latReq), diff=s.officialIn-req; return diff>=0?`OVER ${diff}`:`NEED ${Math.abs(diff)}`; } function headBE(s){ if(!validBe(s.latReq,s.beReq))return '—'; const req=Math.ceil(s.latReq+s.beReq), diff=s.officialIn-req; return diff>=0?`OVER ${diff}`:`NEED ${Math.abs(diff)}`; }

function renderGroupedAgentRows(records, side, elapsed, isLive){ const groups=groupRecordsByStatus(records,side); return groups.map(g=>`<div class="status-group-head ${side} ${statusClass(g.status)}"><span>${escapeHtml(cleanStatusLabel(g.status))}</span><span class="group-count">${g.items.length}</span></div>`+g.items.map(r=>renderAgentRow(r,0,side,false)).join('')).join(''); }
function groupRecordsByStatus(records, side){ const order=side==='in'?IN_STATUS_ORDER:OUT_STATUS_ORDER, buckets=new Map(); records.forEach((r,i)=>{const k=normalizeStatus(r.status); if(!buckets.has(k))buckets.set(k,{status:r.status,firstIndex:i,items:[]}); buckets.get(k).items.push(r);}); return Array.from(buckets.values()).sort((a,b)=>{const ai=order.indexOf(normalizeStatus(a.status)),bi=order.indexOf(normalizeStatus(b.status)); if(ai!==-1||bi!==-1)return (ai===-1?999:ai)-(bi===-1?999:bi); return a.firstIndex-b.firstIndex;}); }

function statusClass(status){ const s=normalizeStatus(status); if(s==='available')return'st-available'; if(s==='auxin')return'st-auxin'; if(s==='auxout')return'st-auxout'; if(s==='busyin')return'st-busyin'; if(s==='hold')return'st-hold'; if(s==='acw'||s==='acwout')return'st-acw'; if(s==='break')return'st-break'; if(s==='lunch')return'st-lunch'; if(s==='meeting')return'st-meeting'; if(s==='personal')return'st-personal'; if(s==='system problems')return'st-sysprob'; if(s==='followup/outbound'||s==='followup/outboundout')return'st-followup'; return'st-other'; }

function compactName(name){ const raw=String(name||'Unknown').replace(/\s+/g,' ').trim(), direct=raw.match(/^(.+?)\s*-\s*([0-9]+)\s*,\s*(.+)$/); if(direct)return `${direct[3].trim()} ${direct[1].trim()}`.trim(); const comma=raw.match(/^(.+?)\s*,\s*(.+)$/); if(comma)return `${comma[2].trim()} ${comma[1].trim()}`.trim(); return raw.replace(/\s*-\s*[0-9]+.*$/,'').trim()||raw; }

function applyAutoReqForInterval(s, intervalId, now){ if(storageStatus.state==='stale')return; const lat=[...s.autoReqSchedule.latReqSchedule].sort((a,b)=>a.intervalId-b.intervalId).filter(x=>x.intervalId<=intervalId).pop(); const be=[...s.autoReqSchedule.beReqSchedule].sort((a,b)=>a.intervalId-b.intervalId).filter(x=>x.intervalId<=intervalId).pop(); if(lat){s.latReq=lat.latReq; document.getElementById(`topReq${s.id}`).value=s.latReq; addSnapshotSample(s, now, 'auto-req');} if(be){s.beReq=be.beReq; document.getElementById(`topBeReq${s.id}`).value=s.beReq; addSnapshotSample(s, now, 'auto-req');} }
function saveSchedules(){ try{ const w=getWindowInfo(); const payload={schemaVersion:STORAGE_KEY,savedAt:new Date().toISOString(),operatingWindowDate:w.operatingWindowDate,lobs:{}}; LOBS.forEach(l=>{ const s=state[l.id-1]; payload.lobs[l.key]={latReqSchedule:s.autoReqSchedule.latReqSchedule,beReqSchedule:s.autoReqSchedule.beReqSchedule,configuredLatReq:s.latReq,configuredBeReq:s.beReq}; }); localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); storageStatus={state:'confirmed',message:`Auto Req saved for ${w.operatingWindowDate}`}; }catch(e){ storageStatus={state:'corrupt',message:'Auto Req schedule could not be saved/restored; localStorage unavailable.'}; } renderStorageStatus(); }
function loadSchedules(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(!raw){storageStatus={state:'missing',message:'Auto Req schedule not restored; enter or confirm schedule.'};return;} const p=JSON.parse(raw); if(p.schemaVersion!==STORAGE_KEY||!p.lobs)throw new Error('schema'); LOBS.forEach(l=>{ const src=p.lobs[l.key]||{}, s=state[l.id-1]; s.autoReqSchedule={latReqSchedule:validateLatSchedule(src.latReqSchedule||[]),beReqSchedule:validateBeSchedule(src.beReqSchedule||[])}; s.latReq=Number.isFinite(+src.configuredLatReq)?+src.configuredLatReq:0; s.beReq=Number.isInteger(+src.configuredBeReq)&&+src.configuredBeReq>=0&&+src.configuredBeReq<=6?+src.configuredBeReq:0; document.getElementById(`topReq${s.id}`).value=s.latReq||''; document.getElementById(`topBeReq${s.id}`).value=s.beReq||''; }); const current=getWindowInfo().operatingWindowDate; storageStatus=p.operatingWindowDate===current?{state:'confirmed',message:`Auto Req restored for ${current}`}:{state:'stale',message:`Saved Auto Req is for ${p.operatingWindowDate||'another window'}; confirm reuse before it applies to ${current}.`}; }catch(e){ storageStatus={state:'corrupt',message:'Auto Req schedule could not be restored; storage is missing/corrupt.'}; } }
function validateLatSchedule(a){ return a.filter(x=>x&&x.intervalId>=1&&x.intervalId<=32&&Number.isFinite(+x.latReq)&&+x.latReq>=0).map(x=>({intervalId:+x.intervalId,startLocal:x.startLocal||intervalStartLabel(+x.intervalId),latReq:+x.latReq})); }
function validateBeSchedule(a){ return a.filter(x=>x&&x.intervalId>=1&&x.intervalId<=32&&Number.isInteger(+x.beReq)&&+x.beReq>=0&&+x.beReq<=6).map(x=>({intervalId:+x.intervalId,startLocal:x.startLocal||intervalStartLabel(+x.intervalId),beReq:+x.beReq})); }
function confirmStoredScheduleReuse(){ storageStatus.state='confirmed'; saveSchedules(); renderAll(); }
function renderStorageStatus(){ setText('storageStatus', storageStatus.message); }

function clearSlot(id){ const s=state[id-1], keep=s.autoReqSchedule, lat=s.latReq, be=s.beReq; Object.assign(s,newLobState(LOBS[id-1])); s.autoReqSchedule=keep; s.latReq=lat; s.beReq=be; s.lockCleared=true; refreshRow(id); }
function clearMaster(reset=true){ if(clearTimerHandle)clearTimeout(clearTimerHandle); if(clearCountdownHandle)clearInterval(clearCountdownHandle); clearTimerHandle=clearCountdownHandle=null; document.getElementById('masterInput').value=''; masterCache=''; document.getElementById('autoNote').textContent='waiting for snapshot'; setHeaderStatus('idle'); if(reset){state.forEach((s,i)=>{ const keep=s.autoReqSchedule, lat=s.latReq, be=s.beReq; Object.assign(s,newLobState(LOBS[i])); s.autoReqSchedule=keep; s.latReq=lat; s.beReq=be; });} renderAll(); }
function tickLive(){ const now=Date.now(); state.forEach(s=>{ ensureInterval(s, now); checkStale(s, now); checkWhatIf(s, now); recalcLob(s, now); }); renderAll(); }
function formatDuration(totalSec){ if(totalSec==null||isNaN(totalSec))return'—'; totalSec=Math.max(0,Math.floor(totalSec)); const h=Math.floor(totalSec/3600), m=Math.floor((totalSec%3600)/60), sec=totalSec%60; return `${pad2(h)}:${pad2(m)}:${pad2(sec)}`; }
function hhmm(d){ return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; } function ymd(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; } function pad2(n){return String(n).padStart(2,'0');}
function decodeEntities(s){return String(s).replace(/&amp;/gi,'&').replace(/&lt;/gi,'<').replace(/&gt;/gi,'>').replace(/&nbsp;/gi,' ').replace(/&#39;/gi,"'").replace(/&quot;/gi,'"');}
function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

injectLatBeStyles(); buildSimSwitch(); buildPriorityRows(); addGlobalPanels(); buildRows(); loadSchedules(); refreshActiveUI(); setListSide('in'); renderAll(); setHeaderStatus('idle'); setInterval(tickLive,1000);
</script>
